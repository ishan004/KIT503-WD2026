<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Registration </title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
  </head>
  <body>

    <nav class="navbar">
      <div class="container">
        <a class="brand" href="index.html">Conference Management System</a>

        <div class="nav-buttons">
          <a class="btn btn-outline nav-link"
            href="registration.html">Registration</a>
          <a class="btn btn-outline nav-link"
            href="submission.html">Submissions</a>
          <a class="btn btn-outline nav-link"
            href="details.html">Details</a>
        </div>
      </div>
    </nav>

    <div class="container-register content-area">
      <div class="form-box-register">
        <h2 class="text-center mb-4">Register</h2>
        <form action="index.html">
          <div class="mb-3">
            <label class="form-label">First name</label>
            <input type="text" class="form-control" name="fname" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Last name</label>
            <input type="text" class="form-control" name="lname" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" class="form-control" name="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="psw"
              required pattern="(?=.*\d).{7,12}"
              title="Password must contain 7 - 12 letters with at least one number.">
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm password</label>
            <input type="password" class="form-control" name="psw-confirm"
              required>
          </div>
          <div class="mb-3">
            <label class="form-label d-block">Research student?</label>
            <input type="radio" name="research" value="yes" required> Yes
            <input type="radio" name="research" value="no"> No
          </div>
          <div class="mb-4 form-check">
            <input type="checkbox" class="form-check-input" id="terms" required>
            <label class="form-check-label" for="terms">I agree to terms and
              conditions</label>
          </div>
          <div class="d-flex gap-2">
            <a href="index.html" class="btn btn-danger w-50">Cancel</a>
            <button type="submit" class="btn btn-success w-50">Submit</button>
          </div>
        </form>
      </div>
    </div>
    <script src="script.js"></script>

  </body>
</html>
