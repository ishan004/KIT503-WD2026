<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Submission List</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <nav class="navbar">
            <div class="container">
                <a class="brand" href="index.html">WD2026</a>
                <div class="nav-buttons">
                    <a href="registration.html"
                        class="btn-outline nav-link">Registration</a>
                    <a href="submission.html"
                        class="btn-outline nav-link">Submission</a>
                    <a href="details.html"
                        class="btn-outline nav-link">Details</a>
                </div>
            </div>
        </nav>

        <main class="content-area">
            <div class="wrapper">
                <div class="details-box submissions-page-box">
                    <h2>Paper Submissions</h2>

                    <div class="filter-box submission-filter-grid">
                        <div class="filter-field">
                            <label for="typeFilter">Filter by type</label>
                            <select id="typeFilter">
                                <option value="all">All</option>
                                <option value="Paper">Paper</option>
                                <option value="Working group">Working
                                    group</option>
                                <option value="Poster">Poster</option>
                                <option value="Doctoral consortium">Doctoral
                                    consortium</option>
                                <option
                                    value="Tips, techniques &amp; courseware">Tips,
                                    techniques &amp; courseware</option>
                            </select>
                        </div>

                        <div class="filter-field search-field">
                            <label for="searchInput">Search by Title</label>
                            <input type="text" id="searchInput"
                                placeholder="e.g. React, Jane..." />
                        </div>

                        <div class="filter-buttons submission-button-stack">
                            <button id="searchBtn" type="button">Search</button>
                            <button id="clearBtn" type="button"
                                class="clear-btn">Clear</button>
                        </div>
                    </div>

                    <div class="submission-table-header">
                        <div>Title</div>
                        <div>Author</div>
                        <div>Submission Type</div>
                        <div>Action</div>
                    </div>

                    <div id="submissionList"></div>

                    <p id="noResults">No matching submissions found.</p>
                </div>
            </div>
        </main>

        <footer>
            <div class="container footer-row">
                <div>© 2026 Web Development Conference · <a href="#">Privacy</a>
                    · <a href="#">Terms</a></div>
                <div><a href="#">Back to top</a></div>
            </div>
        </footer>

        <script src="script.js"></script>
    </body>
</html>
